<!doctype html>
<html>
  <head>
    <title>Steam Currency Converter</title>
    <link rel="stylesheet" href="./styles/style.css" />
    <script src="../data/currencies.js"></script>
    <script src="../data/locales.js"></script>
  </head>

  <body>
    <p class="version-text">v2.0.3</p>
    <img
      src="../assets/steam-currency-converter.png"
      alt="Steam Currency Converter Extension Icon"
      width="92px"
      style="display: block; margin: 0.5rem auto" />

    <h2 style="text-align: center">Steam Currency Converter</h2>

    <div class="option-body">
      <label>Choose Currencies</label>
      <div class="converter-container">
        <div class="sd" id="convert-from-sd">
          <button type="button" class="sd-trigger">USD</button>
          <div class="sd-panel">
            <input type="text" class="sd-search" placeholder="Search..." />
            <div class="sd-options"></div>
          </div>
        </div>

        <label class="switch">
          <input id="price-toggle" type="checkbox" checked />
          <span class="slider round"></span>
        </label>

        <div class="sd" id="convert-to-sd">
          <button type="button" class="sd-trigger">USD</button>
          <div class="sd-panel">
            <input type="text" class="sd-search" placeholder="Search..." />
            <div class="sd-options"></div>
          </div>
        </div>
      </div>
      <button class="custom-currencies-btn" id="open-custom-currencies">Custom Currencies</button>
    </div>

    <div class="tax-container">
      <label for="tax-input">Extra Rate</label>
      <div class="input-container">
        <input
          type="number"
          id="tax-input"
          name="tax-input"
          min="0"
          max="500"
          placeholder="0" />
        <div class="input-percent">%</div>
      </div>
    </div>

    <button class="github-button">
      <img
        src="../assets/github-mark.svg"
        alt="Github Mark White"
        width="24px"
        style="margin-right: 0.5rem" />
    </button>

    <div
      id="alert"
      style="
        display: flex;
        justify-content: center;
        margin-top: 1rem;
        opacity: 0;
        color: #ffcc00;
      ">
      <p>Base Currency is Steam Store Currency</p>
    </div>

    <footer class="footer">
      <span style="font-weight: 300">from</span>
      <a
        href="#"
        class="solidet-linktree"
        title="solidet on linktree"
        id="solidet-link">
        <p class="solidet-text">solidet</p>
      </a>
    </footer>
    <script src="../utils/custom-currencies.js"></script>
    <script src="./scripts/searchable_dropdown.js"></script>
    <script defer src="./scripts/page.script.js"></script>
  </body>
</html>
